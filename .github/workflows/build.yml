name: Java Maven Build



on:
  push:
    branches: [main]


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'


      - name: build with Maven
        run: mvn clean package -DskipTests

      - name: Upload WAR file
        uses: actions/upload-artifact@v4
        with:
          name: myapp
          path: target/*.war
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:

      - name: Download war artifact
        uses: actions/download-artifact@v4
        with:
          name: myapp

      - name: Deploy WAR to Tomcataa
        run: |
          WAR_FILE=$(ls *.war)
          echo "Deploying $WAR_FILE to tomace.."
          echo "URL: ${{ secrets.TOMCAT_URL }}"
          curl -v --upload-file "$WAR_FILE" \
           "http://${{ secrets.TOMCAT_USERNAME }}:${{ secrets.TOMCAT_PASSWORD }}@${{ secrets.TOMCAT_URL }}/manager/text/deploy?path=/myapp&update=true"
